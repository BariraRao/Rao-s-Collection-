<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rao's Boutique | Login</title>
    <style>
        body { background: #0a0a0a; color: #b08d21; font-family: 'Times New Roman', serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { background: #111; padding: 40px; border: 1px solid #b08d21; box-shadow: 0 0 20px rgba(176,141,33,0.2); width: 300px; text-align: center; }
        h2 { letter-spacing: 5px; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #1a1a1a; border: 1px solid #333; color: white; outline: none; }
        button { width: 100%; padding: 12px; background: #b08d21; border: none; color: black; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .toggle-link { font-size: 0.8rem; margin-top: 15px; cursor: pointer; color: #888; display: block; }
        .toggle-link span { color: #b08d21; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="auth-card" id="authBox">
        <h2 id="formTitle">RAO'S</h2>
        <p id="formSub">CREATE ACCOUNT</p>
        <input type="text" id="username" placeholder="USERNAME">
        <input type="password" id="password" placeholder="PASSWORD">
        <button onclick="handleAuth()" id="mainBtn">SIGN UP</button>
        <a class="toggle-link" onclick="toggleMode()" id="toggleText">Already Member? <span>Login</span></a>
    </div>

    <script>
        let isLogin = false;
        function toggleMode() {
            isLogin = !isLogin;
            document.getElementById('formSub').innerText = isLogin ? "LOGIN" : "CREATE ACCOUNT";
            document.getElementById('mainBtn').innerText = isLogin ? "LOGIN" : "SIGN UP";
            document.getElementById('toggleText').innerHTML = isLogin ? "New here? <span>Register</span>" : "Already Member? <span>Login</span>";
        }

        function handleAuth() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if(!user || !pass) return alert("Please fill all fields");

            if(isLogin) {
                const stored = JSON.parse(localStorage.getItem('user'));
                if(stored && stored.u === user && stored.p === pass) {
                    window.location.href = "index.html";
                } else { alert("Invalid Credentials"); }
            } else {
                localStorage.setItem('user', JSON.stringify({u: user, p: pass}));
                alert("Account Created! Now Login.");
                toggleMode();
            }
        }
    </script>
</body>
</html>
