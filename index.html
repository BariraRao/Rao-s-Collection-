<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rao's Collection | Premium Gems</title>
    <style>
        /* CSS Section - Isay mat chirna */
        body {
            background-color: #0f0f0f;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        header {
            background: #1a1a1a;
            padding: 40px 20px;
            border-bottom: 3px solid #d4af37;
        }
        h1 { color: #d4af37; margin: 0; letter-spacing: 3px; font-size: 2rem; }
        .grid {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            padding: 30px 20px;
        }
        .card {
            background: #1e1e1e;
            width: 100%;
            max-width: 350px;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #333;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }
        .info { padding: 20px; }
        .info h3 { color: #d4af37; margin: 10px 0; font-size: 1.4rem; }
        .info p { color: #bbb; font-size: 0.9rem; margin-bottom: 20px; }
        
        /* Buy Now Button Style */
        .buy-btn {
            display: inline-block;
            padding: 12px 25px;
            background-color: #d4af37;
            color: #000;
            text-decoration: none;
            font-weight: bold;
            border-radius: 30px;
            transition: 0.3s ease;
        }
        .buy-btn:hover {
            background-color: #fff;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <header>
        <h1>RAO'S COLLECTION</h1>
        <p style="color: #888; margin-top: 10px;">The Luxury Gemstone Boutique</p>
    </header>

    <div class="grid">
        <div class="card">
            <img src="images/s1.jpg" alt="Royal Sapphire">
            <div class="info">
                <h3>Royal Sapphire</h3>
                <p>Origin: Sri Lanka | Quality: AAA+</p>
                <a href="mailto:btwsamiyamalik@gmail.com?subject=Inquiry for Sapphire" class="buy-btn">Inquire via Email</a>
            </div>
        </div>

        <div class="card">
            <img src="images/o1.jpg" alt="Fire Opal">
            <div class="info">
                <h3>Mexican Fire Opal</h3>
                <p>Natural Iridescent Finish</p>
                <a href="mailto:btwsamiyamalik@gmail.com?subject=Inquiry for Opal" class="buy-btn">Inquire via Email</a>
            </div>
        </div>

        <div class="card">
            <img src="images/e1.jpg" alt="Zambian Emerald">
            <div class="info">
                <h3>Zambian Emerald</h3>
                <p>Deep Green Precision Cut</p>
                <a href="mailto:btwsamiyamalik@gmail.com?subject=Inquiry for Emerald" class="buy-btn">Inquire via Email</a>
            </div>
        </div>
    </div>

</body>
</html>
