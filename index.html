<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rao's Collection | Premium Gems</title>
    <style>
        body { background-color: #ffffff; color: #333; font-family: 'Times New Roman', serif; margin: 0; padding: 0; }
        header { padding: 60px 20px; text-align: center; border-bottom: 1px solid #f2f2f2; }
        h1 { color: #b08d21; font-size: 2.5rem; letter-spacing: 6px; text-transform: uppercase; margin: 0; }
        .tagline { color: #999; font-size: 0.9rem; letter-spacing: 3px; margin-top: 10px; font-style: italic; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; padding: 60px 40px; max-width: 1200px; margin: 0 auto; }
        .card { background: #fff; border: 1px solid #f9f9f9; text-align: center; transition: 0.3s; }
        .card:hover { border-color: #b08d21; box-shadow: 0 10px 30px rgba(0,0,0,0.02); }

        .img-container { width: 100%; height: 350px; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #fff; }
        .card img { max-width: 85%; max-height: 85%; object-fit: contain; }

        .info { padding: 30px; }
        .info h3 { font-size: 1.2rem; color: #b08d21; margin: 0 0 10px; font-weight: normal; letter-spacing: 2px; }
        .price { font-size: 1.1rem; color: #444; margin-bottom: 25px; display: block; }

        .buy-btn { 
            display: inline-block; padding: 12px 40px; background: #b08d21; color: white; 
            text-decoration: none; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; 
            transition: 0.3s; border: 1px solid #b08d21;
        }
        .buy-btn:hover { background: transparent; color: #b08d21; }
    </style>
</head>
<body>

<header>
    <h1>RAO'S COLLECTION</h1>
    <div class="tagline">Timeless Elegance & Rare Stones</div>
</header>

<div class="grid">
    <div class="card">
        <div class="img-container">
            <img src="e1.png" alt="Zambian Emerald">
        </div>
        <div class="info">
            <h3>ZAMBIAN EMERALD</h3>
            <span class="price">$2,500</span>
            <a href="mailto:btwsamiyamalik@gmail.com?subject=Inquiry: Emerald" class="buy-btn">Inquire</a>
        </div>
    </div>

    <div class="card">
        <div class="img-container">
            <img src="o1.png" alt="Premium Opal">
        </div>
        <div class="info">
            <h3>PREMIUM OPAL</h3>
            <span class="price">$850</span>
            <a href="mailto:btwsamiyamalik@gmail.com?subject=Inquiry: Opal" class="buy-btn">Inquire</a>
        </div>
    </div>
</div>

</body>
</html>
